kind = "web"
previewPath = "/"
title = "Vizitka"
version = "1.0.0"
id = "artifacts/vizitka"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25833

[services.development]
run = "pnpm --filter @workspace/vizitka run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vizitka", "run", "build" ]
publicDir = "artifacts/vizitka/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25833"
BASE_PATH = "/"
